<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnyDice Playground</title>
  <link rel="stylesheet" href="playground.css" />
</head>
<body>
  <header>
    <h1>AnyDice Playground</h1>
    <div class="header-meta">
      <span class="status" id="status">Starting up...</span>
    </div>
  </header>

  <main>
    <section class="pane editor-pane">
      <div class="pane-header">
        <h2>Source</h2>
        <div class="pane-actions">
          <button id="share-btn" class="btn-secondary" title="Copy a shareable URL containing this program">Share URL</button>
          <button id="cancel-btn" class="btn-secondary" disabled title="No run in progress">Cancel</button>
          <button id="run-btn" disabled title="Starting up...">Run</button>
        </div>
      </div>
      <div id="editor"></div>
    </section>

    <div class="right-column">
      <section class="pane output-pane">
        <div class="pane-header">
          <h2>Output</h2>
          <div class="view-toggle" role="group" aria-label="Output view mode">
            <button id="view-bars-btn" type="button" class="active" data-view="bars">Bars</button>
            <button id="view-text-btn" type="button" data-view="text">Text</button>
          </div>
        </div>
        <!--
          The placeholder is its own element with exactly one job: show
          status prose until the first run produces content. It never mixes
          with the views' content styling, so no specificity gymnastics.
          Both views start hidden and empty; playground.js reveals the
          active one once there's something to show.
        -->
        <div id="output-placeholder" class="pane-placeholder">
          Starting up...
        </div>
        <div id="output-bars" class="output-view hidden"></div>
        <div id="output-text" class="output-view hidden"></div>
      </section>

      <div id="row-resizer" class="row-resizer" role="separator" aria-orientation="horizontal" aria-label="Resize output and logs panes"></div>

      <section class="pane logs-pane">
        <div class="pane-header">
          <h2>Logs</h2>
        </div>
        <div id="logs-placeholder" class="pane-placeholder">
          Warnings and errors from the current run will appear here.
        </div>
        <div id="logs" class="hidden"></div>
      </section>
    </div>
  </main>

  <!--
    Pyodide loads inside the Web Worker (pyodide-worker.js), not on the
    main thread, so there's no <script src="pyodide.js"> tag here. The
    worker uses importScripts() to pull in Pyodide from the CDN.
  -->

  <!--
    Import map: pin all CodeMirror 6 + Lezer packages to specific versions on
    esm.sh so that every sub-package shares the same module instances. Without
    this, esm.sh resolves each sub-package independently and bundles its own
    copies of peer deps -- you get duplicate-instance bugs that surface as
    opaque "extension is undefined" errors or "can't access property
    Symbol.iterator on undefined" deep in CodeMirror's internals.

    The "*" prefix on URLs (e.g. "*@codemirror/view") tells esm.sh to
    externalize peer deps for that package rather than bundling them. Any
    package with peer deps needs "*"; leaf packages (no peer deps) don't.
    Currently "*"-prefixed: @codemirror/*, @lezer/highlight, @lezer/lr,
    codemirror. Leaf: @codemirror/state, @lezer/common, style-mod, w3c-keyname,
    crelt.
  -->
  <script type="importmap">
    {
      "imports": {
        "@codemirror/state":    "https://esm.sh/@codemirror/state@6.5.2",
        "@codemirror/view":     "https://esm.sh/*@codemirror/view@6.36.2",
        "@codemirror/language": "https://esm.sh/*@codemirror/language@6.10.8",
        "@codemirror/commands": "https://esm.sh/*@codemirror/commands@6.7.1",
        "@codemirror/search":   "https://esm.sh/*@codemirror/search@6.5.8",
        "@codemirror/autocomplete": "https://esm.sh/*@codemirror/autocomplete@6.18.4",
        "@codemirror/lint":     "https://esm.sh/*@codemirror/lint@6.8.4",
        "@lezer/common":        "https://esm.sh/@lezer/common@1.2.3",
        "@lezer/highlight":     "https://esm.sh/*@lezer/highlight@1.2.1",
        "@lezer/lr":            "https://esm.sh/*@lezer/lr@1.4.2",
        "style-mod":            "https://esm.sh/style-mod@4.1.2",
        "w3c-keyname":          "https://esm.sh/w3c-keyname@2.2.8",
        "crelt":                "https://esm.sh/crelt@1.0.6",
        "codemirror":           "https://esm.sh/*codemirror@6.0.1",
        "plotly.js-cartesian-dist-min": "https://esm.sh/plotly.js-cartesian-dist-min@2.35.2"
      }
    }
  </script>
  <script type="module" src="playground.js"></script>
</body>
</html>
